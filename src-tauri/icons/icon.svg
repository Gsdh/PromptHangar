<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded rect background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pen/document icon -->
  <g transform="translate(100, 80)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Document -->
    <rect x="40" y="40" width="200" height="260" rx="16" fill="white" fill-opacity="0.15"/>
    <!-- Lines of text -->
    <line x1="80" y1="100" x2="200" y2="100" stroke-opacity="0.8"/>
    <line x1="80" y1="140" x2="180" y2="140" stroke-opacity="0.6"/>
    <line x1="80" y1="180" x2="200" y2="180" stroke-opacity="0.8"/>
    <line x1="80" y1="220" x2="160" y2="220" stroke-opacity="0.6"/>
    <!-- Pen (editing) -->
    <g transform="translate(180, 20) rotate(45)">
      <rect x="-8" y="-60" width="16" height="80" rx="4" fill="white" fill-opacity="0.9" stroke="none"/>
      <polygon points="-8,20 8,20 0,36" fill="white" fill-opacity="0.9" stroke="none"/>
    </g>
    <!-- Version dots (branching) -->
    <circle cx="260" cy="120" r="8" fill="white" fill-opacity="0.7" stroke="none"/>
    <circle cx="260" cy="160" r="8" fill="white" fill-opacity="0.5" stroke="none"/>
    <circle cx="260" cy="200" r="8" fill="white" fill-opacity="0.3" stroke="none"/>
    <line x1="260" y1="128" x2="260" y2="152" stroke="white" stroke-opacity="0.4" stroke-width="3"/>
    <line x1="260" y1="168" x2="260" y2="192" stroke="white" stroke-opacity="0.3" stroke-width="3"/>
  </g>
</svg>
