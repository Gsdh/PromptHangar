version: 2
updates:
  # Frontend npm dependencies (React, Tauri JS bindings, Vite, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "@uiw/react-codemirror"
      dev-tooling:
        dependency-type: "development"

  # Rust backend dependencies (Tauri core, SQLite, keyring, etc.)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri-rust:
        patterns:
          - "tauri"
          - "tauri-*"

  # GitHub Actions used in release/codeql workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
